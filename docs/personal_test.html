<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personlig Test - Vandladningsbesvær</title>
    <link rel="stylesheet" href="styles.css">
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-N5F79SNVLK"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-N5F79SNVLK');
</script>

<body class="personal-test">
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo"><a href="index.html">Vandladningsbesvær.dk</a></div>
                <div class="nav-group">
                    <div class="dropdown">
                        <button class="nav-btn dropdown-btn">Behandlinger ▾</button>
                        <div class="dropdown-content">
                            <a href="treatment_info.html">Læs om behandlinger</a>
                            <a href="treatments.html">Sammenlign behandlinger</a>
                        </div>
                    </div>
                    <a href="personal_test.html" class="nav-btn active">Personlig test</a>
                    <a href="about.html" class="nav-btn">Om siden</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="treatment-page">
                <h2>Besvar følgende spørgsmål for at hjælpe med at finde den bedste behandling for dig</h2>
                <br>
                <div class="questions-container" id="questions"></div>
            </div>

            <div id="modals"></div>
            <div class="compare-section">
                <button class="compare-btn" onclick="calculateResults()" disabled>
                    BESVAR ALLE SPØRGSMÅL
                </button>
        </div>
    </main>
    
    <script>
        const prostateSizeQuestion = {
            id: 'prostateSize',
            text: 'Prostata størrelse',
            info: 'Vælg størrelsen på din prostata i cm³. Denne information har du fået fra din læge.',
            options: [
                { value: 'small', label: '< 30 cm³', range: [0, 29] },
                { value: 'medium', label: '30-80 cm³', range: [30, 80] },
                { value: 'large', label: '> 80 cm³', range: [81, 999] },
                { value: 'unknown', label: 'Ved ikke', range: null }
            ]
        };

        const questions = [
            { id: 'effectiveness', text: 'Hvor vigtigt er det, at du får den mest effektive behandling?', info: 'Med effektiv menes der at man fjerner mest muligt prostatavæv samt at der ses den største forbedring af vandladningstrålen og største reduktion af vandladningsgener.' },
            { id: 'retreatment', text: 'Hvor vigtigt er det, at risikoen for genbehandling er mindst mulig?', info: 'Risikoen for genbehandling nedsættes jo mere prostatavæv der fjernes.' },
            { id: 'gentle', text: 'Hvor vigtigt er det, at du får den mest skånsomme behandling med færrest mulige komplikationer?', info: 'Ved skånsom behandling menes at reducere risikoen for komplikationer ofter operationen. F.eks. infektion, blødning, inkontinens (utæthed), forsnævring af urinrøret, seksuelle bivirkninger m.m.' },
            { id: 'sexual', text: 'Hvor vigtigt er det at undgå seksuelle bivirkninger?', info: 'Den hyppigste seksuelle bivirkning er retrograd ejakulation (tør orgasme). Herudover kan der også opstå rejsningsbesvær ifm. med operation mod vandladningsbesvær.' },
            { id: 'catheter', text: 'Hvor vigtigt er det at undgå et kateter efter behandlingen?', info: 'Efter de fleste operationer anlægges et midlertidigt blærekateter. I nogle tilfælde fjernes det umiddelbart efter operationen og andre i tilfælde bliver man sendt hjem med et blærekateter.' }
        ];

        const treatments = {
            'TUI-P': { name: 'TUI-P', fullName: 'Transurethral incision af prostata', scores: [2, 2, -1, -1, 2], prostateSize: [0, 29] },
            'TUR-P': { name: 'TUR-P', fullName: 'Transurethral resektion af prostata', scores: [2, 2, -1, -2, 2], prostateSize: [30, 80] },
            'PVP': { name: 'PVP', fullName: 'Transurethral prostatavarisation', scores: [0, 0, -1, -2, 2], prostateSize: [30, 80] },
            'AEEP': { name: 'AEEP', fullName: 'Transurethral enukleation', scores: [2, 2, -2, -2, -2], prostateSize: [81, 999] },
            'FREYER': { name: 'FREYER', fullName: 'Åben transvesikal prostatektomi', scores: [2, 2, -2, -2, -2], prostateSize: [81, 999] },
            'RASP': { name: 'RASP', fullName: 'Robotassisteret transvesikal prostatektomi', scores: [2, 2, -2, -2, -2], prostateSize: [81, 999] },
            'PAE': { name: 'PAE', fullName: 'Prostataembolisering', scores: [-2, -2, 2, 2, -2], prostateSize: [30, 999] },
            'TUMT': { name: 'TUMT', fullName: 'Mikrobølgebehandling (CoreTherm)', scores: [-2, -2, 2, 2, -2], prostateSize: [30, 999] },
            'UROLIFT': { name: 'UROLIFT', fullName: 'Prostatic urethral lift', scores: [-2, -2, 2, 2, 0], prostateSize: [0, 69] },
            'REZUM': { name: 'REZUM', fullName: 'Rezum-behandling', scores: [-2, -2, 2, 2, 0], prostateSize: [30, 80] }
        };

        const labels = ['Meget uvigtigt', 'Lidt uvigtigt', 'Neutral', 'Lidt vigtigt', 'Meget vigtigt'];

        document.addEventListener('DOMContentLoaded', function() {
            createQuestions();
            createModals();
            setupEventListeners();
            updateResultsButton();
        });

        function createQuestions() {
            const container = document.getElementById('questions');
            container.innerHTML = `
                <div class="effectiveness-question">
                    <!-- Prostata størrelse spørgsmål -->
                    <div class="slider-container">
                        <div class="slider-wrapper">
                            <h2>
                                ${prostateSizeQuestion.text}
                            </h2>
                            <div class="rating-scale" style="display: flex; justify-content: center; gap: 2.5rem; margin-top: 2rem; margin-bottom: 3rem; flex-wrap: wrap;">
                                ${prostateSizeQuestion.options.map(option => `
                                    <label class="rating-item" style="flex: 0 0 auto;">
                                        <input type="radio" name="prostateSize" value="${option.value}" style="display: none;">
                                        <div class="rating-pill" data-value="${option.value}">
                                            <div class="rating-label" style="font-weight: 700; color: #2c5aa0; font-size: 1.125rem; white-space: nowrap; line-height: 1.2;">${option.label}</div>
                                        </div>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    
                    ${questions.map(q => `
                        <div class="slider-container">
                            <div class="slider-wrapper">
                                <h2>
                                    ${q.text}
                                    <button class="info-bubble" onclick="showModal('${q.id}')">
                                        <span>i</span>
                                    </button>
                                </h2>
                                <div class="slider-labels">
                                    ${labels.map(label => `<span class="slider-label">${label}</span>`).join('')}
                                </div>
                                <div class="slider-track-container">
                                    <div class="slider-ticks">
                                        ${Array.from({length: 5}, (_, i) => `<span class="tick"></span>`).join('')}
                                    </div>
                                    <input 
                                        type="range" 
                                        min="1" 
                                        max="5" 
                                        value="3" 
                                        class="rating-slider" 
                                        data-question="${q.id}"
                                        id="${q.id}-slider"
                                    >
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function createModals() {
            const container = document.getElementById('modals');
            const allQuestions = [prostateSizeQuestion, ...questions];
            container.innerHTML = allQuestions.map((q, index) => `
                <div id="${q.id}-modal" class="modal">
                    <div class="modal-content">
                        <span class="close" onclick="closeModal('${q.id}')">&times;</span>
                        <p>${q.info}</p>
                    </div>
                </div>
            `).join('');
        }

        function setupEventListeners() {
            // Handle prostata size selection
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('rating-pill') || e.target.closest('.rating-pill')) {
                    const pill = e.target.classList.contains('rating-pill') ? e.target : e.target.closest('.rating-pill');
                    const radioInput = pill.closest('label').querySelector('input[type="radio"]');
                    
                    // Remove selected class from all pills
                    document.querySelectorAll('.rating-pill').forEach(p => p.classList.remove('selected'));
                    
                    // Add selected class to clicked pill
                    pill.classList.add('selected');
                    radioInput.checked = true;
                    
                    updateResultsButton();
                }
            });

            document.addEventListener('input', function(e) {
                if (e.target.classList.contains('rating-slider')) {
                    updateResultsButton();
                }
            });

            window.onclick = function(e) {
                if (e.target.classList.contains('modal')) {
                    e.target.style.display = 'none';
                    document.body.style.overflow = 'auto';
                }
            };

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal').forEach(modal => {
                        modal.style.display = 'none';
                    });
                    document.body.style.overflow = 'auto';
                }
            });
        }

        function updateResultsButton() {
            const sliders = document.querySelectorAll('.rating-slider');
            const prostateSizeSelected = document.querySelector('input[name="prostateSize"]:checked');
            const btn = document.querySelector('.compare-btn');
            
            const allAnswered = sliders.length === questions.length && prostateSizeSelected;
            btn.disabled = !allAnswered;
            btn.style.opacity = btn.disabled ? '0.6' : '1';
            btn.textContent = btn.disabled ? 'BESVAR ALLE SPØRGSMÅL' : 'SE MINE RESULTATER';
        }

        function showModal(id) {
            const modal = document.getElementById(id + '-modal');
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal(id) {
            document.getElementById(id + '-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function calculateResults() {
            const results = {};
            questions.forEach(q => {
                const slider = document.querySelector(`[data-question="${q.id}"]`);
                if (slider) results[q.id] = parseInt(slider.value);
            });
            
            // Get prostata size selection
            const prostateSizeInput = document.querySelector('input[name="prostateSize"]:checked');
            const prostateSizeValue = prostateSizeInput ? prostateSizeInput.value : null;
            results.prostateSize = prostateSizeValue;

            localStorage.setItem('testResults', JSON.stringify(results));
            const ranked = rankTreatments(results);
            localStorage.setItem('rankedTreatments', JSON.stringify(ranked));
            showResults(results, ranked);
        }

        function rankTreatments(userAnswers) {
            const userScores = questions.map(q => userAnswers[q.id] - 3);
            
            // Get user's prostata size range
            const prostateSizeOption = prostateSizeQuestion.options.find(opt => opt.value === userAnswers.prostateSize);
            const userProstateRange = prostateSizeOption ? prostateSizeOption.range : null;
            
            // Filter treatments based on prostata size and calculate distance
            // If userProstateRange is null (Ved ikke), show all treatments
            const filteredTreatments = Object.entries(treatments).filter(([id, treatment]) => {
                // If user selected "Ved ikke", show all treatments
                if (userProstateRange === null) return true;
                
                // If treatment doesn't have prostateSize defined, include it
                if (!treatment.prostateSize) return true;
                
                const [userMin, userMax] = userProstateRange;
                const [treatmentMin, treatmentMax] = treatment.prostateSize;
                
                // Check if ranges overlap
                return userMax >= treatmentMin && userMin <= treatmentMax;
            });
            
            return filteredTreatments.map(([id, treatment]) => {
                const distance = Math.sqrt(userScores.reduce((sum, score, i) => 
                    sum + Math.pow(score - treatment.scores[i], 2), 0));
                return { id, ...treatment, distance };
            }).sort((a, b) => a.distance - b.distance);
        }

        function showResults(userAnswers, ranked) {
            const questionLabels = {
                effectiveness: 'Effektivitet',
                retreatment: 'Lav genbehandlingsrisiko',
                gentle: 'Skånsom behandling',
                sexual: 'Undgå seksuelle bivirkninger',
                catheter: 'Undgå kateter'
            };

            const modal = document.createElement('div');
            modal.id = 'results-modal';
            modal.className = 'modal';
            modal.style.display = 'block';
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 800px; max-height: 85vh; overflow-y: auto; margin: 5vh auto;">
                    <span class="close" onclick="closeResults()">&times;</span>
                    <h2 style="color: #2c5aa0; margin-bottom: 1.5rem;">Dine testresultater</h2>
                    
                    <div style="margin-bottom: 2rem;">
                        <h3 style="color: #1e3a5f; margin-bottom: 1rem;">Din prostata størrelse:</h3>
                        <div style="background: #e3f2fd; padding: 1rem; border-radius: 8px; border-left: 4px solid #2196f3; margin-bottom: 1.5rem;">
                            <strong style="color: #1565c0;">
                                ${prostateSizeQuestion.options.find(opt => opt.value === userAnswers.prostateSize)?.label || 'Ikke valgt'}
                            </strong>
                        </div>
                        
                        <h3 style="color: #1e3a5f; margin-bottom: 1rem;">Dine prioriteter:</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                            ${questions.map(q => `
                                <div style="background: #f8f9fa; padding: 1rem; border-radius: 8px; border-left: 4px solid #4a90d9;">
                                    <strong>${questionLabels[q.id]}:</strong><br>
                                    ${labels[userAnswers[q.id] - 1]}
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div>
                        <h3 style="color: #1e3a5f; margin-bottom: 1rem;">Anbefalede behandlinger (${ranked.length}):</h3>
                        <p style="margin-bottom: 1rem; color: #666;">Behandlingerne er filtreret efter din prostata størrelse og rangeret efter hvor godt de matcher dine prioriteter:</p>
                        
                        ${ranked.length === 0 ? `
                            <div style="background: #fff3cd; padding: 1.5rem; border-radius: 8px; border-left: 4px solid #ffc107; margin-bottom: 1rem;">
                                <p style="margin: 0; color: #856404;"><strong>Ingen behandlinger fundet</strong><br>Der er ingen behandlinger der matcher din prostata størrelse. Kontakt venligst din læge for vejledning.</p>
                            </div>
                        ` : ''}
                        
                        <div style="display: grid; gap: 1rem;">
                            ${(() => {
                                const topFive = ranked.slice(0, 5);
                                if (topFive.length === 0) return '';
                                // Calculate displayed percent for each (clamped and rounded)
                                const percents = topFive.map(t => {
                                    const raw = 100 - (t.distance / Math.sqrt(50)) * 100; // keep existing normalization
                                    return Math.max(0, Math.min(100, Math.round(raw)));
                                });
                                const maxPercent = percents.length ? Math.max(...percents) : 0;
                                return topFive.map((treatment, index) => {
                                    const percent = percents[index] ?? 0;
                                    const isTop = percent === maxPercent;
                                    const border = isTop ? '#4a90d9' : '#e9ecef';
                                    const shadow = isTop ? 'box-shadow: 0 4px 15px rgba(74, 144, 217, 0.3);' : '';
                                    const pillBg = isTop ? '#4a90d9' : '#6c757d';
                                    const pillText = isTop ? `Bedste match – ${percent}%` : `Match: ${percent}%`;
                                    const titlePrefix = index === 0 ? '1. ' : `${index + 1}. `;
                                    return `
                                        <div class="treatment-result-card" style="background: white; padding: 1.5rem; border-radius: 10px; border: 2px solid ${border}; ${shadow} transition: all 0.3s ease; cursor: pointer;">
                                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                                                <h4 style=\"color: #2c5aa0; margin: 0; font-size: 1.3rem;\">${titlePrefix}${treatment.name}</h4>
                                                <span class=\"treatment-pill\" style=\"background: ${pillBg}; color: white; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.9rem; transition: all 0.3s ease;\">${pillText}</span>
                                            </div>
                                            <p style=\"color: #666; margin: 0; font-size: 0.95rem;\">${treatment.fullName}</p>
                                        </div>
                                    `;
                                }).join('');
                            })()}
                        </div>
                    </div>

                    <div style="margin-top: 2rem; text-align: center;">
                        <button onclick="navigateToComparison()" style="background: linear-gradient(135deg, #4a90d9, #2c5aa0); color: white; padding: 15px 40px; border: none; border-radius: 25px; font-size: 1.1rem; font-weight: 600; font-family: 'Arial Black', Arial, sans-serif; cursor: pointer; margin-right: 1rem; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.3s ease;">
                            Sammenlign top behandlinger
                        </button>
                        <button onclick="closeResults()" style="background: linear-gradient(135deg, #6c757d, #495057); color: white; padding: 15px 40px; border: none; border-radius: 25px; font-size: 1.1rem; font-weight: 600; font-family: 'Arial Black', Arial, sans-serif; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.3s ease;">
                            Luk
                        </button>
                    </div>

                    <div style="margin-top: 2rem; padding: 1rem; background: #fff3cd; border: 1px solid #ffeaa7; border-radius: 8px;">
                        <p style="margin: 0; color: #856404; font-size: 0.9rem;">
                            <strong>Vigtigt:</strong> Disse resultater er vejledende. Diskuter altid dine muligheder med din læge.
                        </p>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';

            // Add hover effects for main action buttons
            modal.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('mouseenter', () => btn.style.transform = 'translateY(-2px)');
                btn.addEventListener('mouseleave', () => btn.style.transform = 'translateY(0)');
            });

            // Add hover effects for treatment cards and pills using setTimeout to ensure DOM is ready
            setTimeout(() => {
                modal.querySelectorAll('.treatment-result-card').forEach(card => {
                    const isTopRanked = card.style.border.includes('#4a90d9');
                    
                    card.addEventListener('mouseenter', () => {
                        card.style.transform = 'translateY(-3px)';
                        card.style.boxShadow = '0 6px 20px rgba(0, 0, 0, 0.15)';
                        
                        // Enhance pill hover effect
                        const pill = card.querySelector('.treatment-pill');
                        if (pill) {
                            pill.style.transform = 'scale(1.05)';
                            pill.style.boxShadow = '0 2px 8px rgba(0, 0, 0, 0.2)';
                        }
                    });
                    
                    card.addEventListener('mouseleave', () => {
                        card.style.transform = 'translateY(0)';
                        card.style.boxShadow = isTopRanked ? '0 4px 15px rgba(74, 144, 217, 0.3)' : '';
                        
                        // Reset pill hover effect
                        const pill = card.querySelector('.treatment-pill');
                        if (pill) {
                            pill.style.transform = 'scale(1)';
                            pill.style.boxShadow = 'none';
                        }
                    });
                });
            }, 10);
        }

        function closeResults() {
            const modal = document.getElementById('results-modal');
            if (modal) {
                modal.remove();
                document.body.style.overflow = 'auto';
            }
        }

        function navigateToComparison() {
            const ranked = JSON.parse(localStorage.getItem('rankedTreatments') || '[]');
            // Map the treatment names to the format expected by comparison.html
            const treatmentMapping = {
                'TUI-P': 'tui-p',
                'TUR-P': 'tur-p', 
                'PVP': 'pvp',
                'AEEP': 'aeep',
                'FREYER': 'freyer',
                'RASP': 'rasp',
                'PAE': 'pae',
                'TUMT': 'tumt',
                'UROLIFT': 'urolift',
                'REZUM': 'rezum'
            };
            
            const top = ranked.slice(0, 3).map(t => treatmentMapping[t.id] || t.id.toLowerCase().replace('-', ''));
            localStorage.setItem('selectedTreatments', JSON.stringify(top));
            window.location.href = `comparison.html?treatments=${top.join(',')}`;
        }
    </script>
    <script src="mobile-dropdown.js"></script>
</body>
</html>
