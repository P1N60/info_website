        function getSelectedTreatments() {
            const urlParams = new URLSearchParams(window.location.search);
            const treatments = urlParams.get('treatments');
            if (treatments) return treatments.split(',');
            
            const stored = localStorage.getItem('selectedTreatments');
            return stored ? JSON.parse(stored) : ['tur-p', 'tumt'];
        }

        function loadComparison() {
            const treatments = getSelectedTreatments();
            const content = document.getElementById('comparison-content');
            const validTreatments = treatments.filter(t => treatmentData[t]);
            
            if (validTreatments.length >= 2) {
                const comparisonHTML = generateComparison(validTreatments);
                content.innerHTML = comparisonHTML;
            } else {
                content.innerHTML = `
                    <div class="comparison-section">
                        <h2>Sammenligning ikke tilgængelig</h2>
                        <p>Vælg mindst 2 behandlinger fra <a href="treatments.html">behandlingssiden</a> for at sammenligne.</p>
                        <p>Tilgængelige behandlinger: ${Object.keys(treatmentData).join(', ')}</p>
                        <p>Valgte behandlinger: ${treatments.join(', ')}</p>
                    </div>
                `;
            }
        }

                function generateComparison(treatments) {
                        return generateTable(treatments);
                }

                function generateTable(treatments) {
                        const headers = treatments.map(t => `
                                <th>${treatmentData[t].name}
                                        <span class="sub-label">${treatmentData[t].full_name}</span>
                                </th>
                        `).join('');

                        const row = (label, formatter) => `
                                <tr>
                                        <td class="row-title">${label}</td>
                                        ${treatments.map(t => `<td>${formatter(t)}</td>`).join('')}
                                </tr>
                        `;

                        const formatValue = (obj) => `${obj.value}${obj.unit ? ' ' + obj.unit : ''}`;

                        const minWidth = 240 /* first column */ + treatments.length * 200; // px per treatment col
                        const tableHTML = `
                <div class="scroll-hint">Skub vandret for at se alle kolonner →</div>
                <div class="comparison-table-wrapper">
                                    <table class="comparison-table" role="table" style="min-width: ${minWidth}px">
                                        <thead>
                                            <tr>
                                                <th></th>
                                                ${headers}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${row('Bedøvelse', t => treatmentData[t].anesthesia.join('<br>'))}
                                            ${row('Prostata størrelse', t => formatValue(treatmentData[t].prostate_size))}
                                            ${row('Indlæggelsestid', t => formatValue(treatmentData[t].hospital_stay))}
                                            ${row('Blærekateter efter behandling', t => formatValue(treatmentData[t].catheter_days))}
                                            ${row('Forbedring af vandladningsgener', t => formatValue(treatmentData[t].improvement_symptoms))}
                                            ${row('Forbedring af urinstrålen', t => formatValue(treatmentData[t].improvement_flow))}
                                            ${row('Risiko for genbehandling efter 5 år', t => formatValue(treatmentData[t].retreatment_risk))}
                                            ${row('Risiko for forsnævring af urinrør og blærehals', t => formatValue(treatmentData[t].stricture_risk))}
                                            ${row('Risiko for forstyrelse af sædafgang', t => formatValue(treatmentData[t].ejd_risk))}
                                            ${row('Risiko for rejsningsbesvær', t => formatValue(treatmentData[t].ed_risk))}
                                            ${row('Hospital', t => formatValue(treatmentData[t].hospital))}
                                        </tbody>
                                    </table>
                                </div>
                        `;

                        return tableHTML;
                }

        document.addEventListener('DOMContentLoaded', function() {
            const content = document.getElementById('comparison-content');
            
            if (!content) {
                console.error('comparison-content element not found!');
                return;
            }
            
            loadComparison();
        });
